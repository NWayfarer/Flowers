<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
	<title>Цветы</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="stylesheet" href="../style.css">
	<link rel="shortcut icon" href="../circles.ico">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">

	<script src="https://use.fontawesome.com/c61f48834a.js"></script>

</head>

<body>
	<div class="container">
		
		<div class="info-section-cont full-sis pm-list">
			<div class="rBlock-header info-sect-h h-container-flex">
				<h3 class="rb-title">Редактировать товар</h3>
			</div>

			<div class="pm-body edit-view sect-cont-def">
				<div class="pm-info-container">
					<div class="pm-info pm-info-main">
						<h4 class="pm-i-title">Основные данные</h4>

						<div class="pm-i-fields-group">
							<div class="pm-i-field">
								<div class="title">Название</div>
								<div class="counter">
									<input class="custominput" value="Букет из гортензий и пионовидных роз" />
									<output>36/70</output>
								</div>

							</div>
							<div class="pm-i-f-group">
								<div class="pm-i-field">
									<div class="title">Категория</div>
									<!-- Выпадающий список -->
									<input class="custominput" value="Букеты" />
								</div>
								<div class="pm-i-field">
									<div class="title">Подкатегория</div>
									<!-- Выпадающий список -->
									<input class="custominput" value="Авторские" />
								</div>
								<div class="pm-i-field">
									<div class="title">Цвет</div>
									<!-- Выпадающий список -->
									<input class="custominput" value="Нежный" />
								</div>
							</div>
							<div class="pm-i-field">
								<div class="title">Описание</div>
								<textarea class="customtextarea" rows="4" wrap="hard">Свеча в стеклянном стакане с деревянным фитилем, благодаря которому при горении можно услышать легкое потрескивание. 
									Состав: кокосовый воск, отдушка, деревянный фитиль</textarea>
							</div>
						</div>

						<div class="pm-i-cb-container"></div>
					</div>

					<div class="pm-info pm-info-params"></div>
				</div>

				<div class="pm-products-container"></div>
			</div>
		</div>
		
	</div>
</body>

<script src="../script/jquery-3.3.1.min.js"></script>
<script src="../script/main.js"></script>

</html>
