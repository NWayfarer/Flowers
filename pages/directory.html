<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
	<title>Цветы</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="stylesheet" href="../style.css">
	<link rel="shortcut icon" href="../circles.ico">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">

	<script src="https://use.fontawesome.com/c61f48834a.js"></script>

</head>

<body>
	<div class="container">
		
		<div class="info-section-cont left-sis journal-cont">
			<div class="rBlock-header info-sect-h h-container-flex">
				<div class="btn-back-cont">
					<a href="javascript:void(0)" class="btn btn-back">
						<img src="../img/arrow-left.svg" alt="">
					</a>
					<div class="title">Справочники</div>
				</div>
			</div>
			
			<div class="rBlock-body directory-spec">
				<div class="filter-table sect-cont-def">
					<div class="ft-control">
						<div class="control-item">Название фильтра</div>
						<div class="control-item">Кол-во записей</div>
						<div class="control-item">Посл. изм.</div>
					</div>
					
					<div class="ft-body">
						<div class="ft-row active">
							<div class="filter-name">Размер</div>
							<div class="filter-amount">10</div>
							<div class="filter-last-change">12.02.2025,12:30</div>
							<div class="filter-edit"><a href="javascript:void();" class="edit-link">Редактировать</a></div>
						</div>

						<div class="ft-row">
							<div class="filter-name">Цвет</div>
							<div class="filter-amount">3</div>
							<div class="filter-last-change">12.02.2025,12:30</div>
							<div class="filter-edit"><a href="javascript:void();" class="edit-link">Редактировать</a></div>
						</div>
						
						<div class="ft-row">
							<div class="filter-name">Цветы в составе</div>
							<div class="filter-amount">30</div>
							<div class="filter-last-change">12.02.2025,12:30</div>
							<div class="filter-edit"><a href="javascript:void();" class="edit-link">Редактировать</a></div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="info-section-cont right-sis directory-sect" data-empty="Выберите справочник, чтобы увидеть информацию">
			<div class="rBlock-header info-sect-h h-container-flex">
				<div class="btns-container">
					<div class="btns-read">
						<button class="btn btn-transperent">Редактировать</button>
					</div>
				</div>
			</div>

			<div class="directory-table">
				<div class="directory-row">
					<div class="num">5</div>
					<div class="name">80</div>
				</div>
				<div class="directory-row">
					<div class="num">4</div>
					<div class="name">70</div>
				</div>
				<div class="directory-row">
					<div class="num">3</div>
					<div class="name">60</div>
				</div>
				<div class="directory-row">
					<div class="num">2</div>
					<div class="name">50</div>
				</div>
				<div class="directory-row">
					<div class="num">1</div>
					<div class="name">40</div>
				</div>
			</div>
		</div>
		
	</div>
</body>

<script src="../script/jquery-3.3.1.min.js"></script>
<script src="../script/main.js"></script>

</html>
