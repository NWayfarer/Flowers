<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
	<title>Цветы</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<!-- <link rel="stylesheet" href="../style.css"> -->

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">

	<script src="https://use.fontawesome.com/c61f48834a.js"></script>

</head>

<body>
	<div class="container">
		<div class="free-container">
			<div class="order-details-cont">
				
				<!-- Секция звонка -->
				<!-- ВАЖНО. У контейнера с классом "modal__container_form" нужно изменить значение gap с 45px на 30px -->
				<!-- Классы и стили написаны с учетом имеющихся на сайте -->
				<div class="modal__container_form_call_cont">
					<p class="form_call_desc">
						<!-- В попапе регистрации "для регистрации", в попапе авторизации "для авторизации" -->
						Позвоните по номеру ниже, затем нажмите кнопку «Продолжить» для авторизации.<br>
						Вызов будет сброшен автоматически.
					</p>
					<a href="tel:+79698862607" class="btnModal btnModal_active">
						<span class="number">+7 969 886-26-07</span>
						<span class="desc">Позвонить (Звонок бесплатный)</span>
					</a>
				</div>
				<!-- !Секция звонка -->

				<style>
					.modal__container_form_call_cont {
						display: flex;
						flex-direction: column;
						align-items: center;
						row-gap: 10px;
					}

					.modal__container_form_call_cont .form_call_desc {
						max-width: 330px;
						font-size: 14px;
						font-weight: 500;
						text-align: center;
						line-height: 1.1;
					}

					.modal__container_form_call_cont .btnModal.btnModal_active {
						width: 100%;
						padding: 14px 32px;
						background: #1B2F33;
						backdrop-filter: blur(22px);
						display: flex;
						flex-direction: column;
						align-items: center;
						row-gap: 5px;
					}

					.modal__container_form_call_cont .btnModal .number {
						font-size: 24px;
						font-weight: 500;
						line-height: 1;
					}

					.modal__container_form_call_cont .btnModal .desc {
						font-size: 16px;
						font-weight: 500;
						opacity: .6;
					}
				</style>
			</div>
		</div>
	</div>
</body>

<!-- <script src="../script/jquery-3.3.1.min.js"></script> -->

</html>
